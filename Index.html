<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Texture Sandbox</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #888;
  }

  canvas {
    display: block;
  }

  #info {
    position: absolute;
    top: 70px;
    left: 10px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    font-family: Arial;
    z-index: 10;
  }

  #textureUpload {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: white;
    padding: 10px;
    border-radius: 10px;
  }
</style>
</head>

<body>

<input
  type="file"
  id="textureUpload"
  accept="image/png, image/jpeg"
/>

<div id="info">
  W/S = Drive<br>
  A/D = Turn<br>
  Drag Mouse = Rotate Camera
</div>

<script type="importmap">
{
  "imports": {
    "three": "./build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from 'three';

import { OrbitControls } from './jsm/controls/OrbitControls.js';
import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';



// --------------------------------------------------
// SCENE
// --------------------------------------------------

const scene = new THREE.Scene();



// --------------------------------------------------
// FOG
// --------------------------------------------------

scene.fog = new THREE.Fog(0xbfd1e5, 50, 400);



// --------------------------------------------------
// CAMERA
// --------------------------------------------------

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  2000
);

camera.position.set(0, 2, 5);



// --------------------------------------------------
// RENDERER
// --------------------------------------------------

const renderer = new THREE.WebGLRenderer({
  antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);

renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);



// --------------------------------------------------
// CONTROLS
// --------------------------------------------------

const controls = new OrbitControls(camera, renderer.domElement);

controls.target.set(0, 1, 0);

controls.update();



// --------------------------------------------------
// LIGHTING
// --------------------------------------------------

const ambientLight = new THREE.AmbientLight(0xffffff, 2);

scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 3);

directionalLight.position.set(5, 10, 7);

scene.add(directionalLight);



// --------------------------------------------------
// 360 BACKGROUND
// --------------------------------------------------

const textureLoader = new THREE.TextureLoader();

textureLoader.load('field360.jpg', (bgTexture) => {

  bgTexture.mapping = THREE.EquirectangularReflectionMapping;

  scene.background = bgTexture;

  // Makes reflections/environment lighting work too
  scene.environment = bgTexture;

});



// --------------------------------------------------
// GRASS GROUND
// --------------------------------------------------

const grassTexture = textureLoader.load('grass.jpg');

grassTexture.wrapS = THREE.RepeatWrapping;
grassTexture.wrapT = THREE.RepeatWrapping;

grassTexture.repeat.set(200, 200);

grassTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();

const ground = new THREE.Mesh(

  new THREE.PlaneGeometry(5000, 5000),

  new THREE.MeshStandardMaterial({
    map: grassTexture
  })

);

ground.rotation.x = -Math.PI / 2;

ground.position.y = 0;

scene.add(ground);



// --------------------------------------------------
// LOAD CAR MODEL
// --------------------------------------------------

const loader = new GLTFLoader();

let carModel;

loader.load(

  'car.glb',

  (gltf) => {

    console.log("MODEL LOADED");

    carModel = gltf.scene;

    carModel.scale.set(1, 1, 1);

    scene.add(carModel);

  },

  undefined,

  (error) => {

    console.error(error);

  }

);



// --------------------------------------------------
// TEXTURE UPLOAD
// --------------------------------------------------

const uploadInput = document.getElementById('textureUpload');

uploadInput.addEventListener('change', (event) => {

  const file = event.target.files[0];

  if (!file || !carModel) return;

  const imageURL = URL.createObjectURL(file);

  textureLoader.load(imageURL, (texture) => {

    texture.flipY = false;

    carModel.traverse((child) => {

      if (child.isMesh) {

        child.material.map = texture;

        child.material.needsUpdate = true;

      }

    });

  });

});



// --------------------------------------------------
// RESIZE
// --------------------------------------------------

window.addEventListener('resize', () => {

  camera.aspect = window.innerWidth / window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);

});



// --------------------------------------------------
// KEYBOARD INPUT
// --------------------------------------------------

const keys = {};

window.addEventListener('keydown', (event) => {

  keys[event.key.toLowerCase()] = true;

});

window.addEventListener('keyup', (event) => {

  keys[event.key.toLowerCase()] = false;

});



// --------------------------------------------------
// CAR MOVEMENT
// --------------------------------------------------

let speed = 0;

function animate() {

  requestAnimationFrame(animate);

  if (carModel) {

    // FORWARD / BACKWARD

    if (keys['w']) {

      speed = 0.08;

    } else if (keys['s']) {

      speed = -0.05;

    } else {

      speed = 0;

    }

    // TURNING

    if (keys['a']) {

      carModel.rotation.y += 0.03;

    }

    if (keys['d']) {

      carModel.rotation.y -= 0.03;

    }

    // MOVE CAR

    carModel.translateZ(-speed);

  }

  renderer.render(scene, camera);

}

animate();

</script>

</body>
</html>
