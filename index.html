<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Texture Map Cup</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}
canvas { display: block; }

#uiPanel {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
  background: rgba(255,255,255,0.92);
  padding: 14px;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 250px;
}
#uiPanel label {
  display: flex;
  flex-direction: column;
  font-size: 14px;
  gap: 4px;
}
#info {
  font-size: 13px;
  color: #333;
  margin-top: 6px;
  line-height: 1.6;
}

#lockOverlay {
  position: absolute;
  inset: 0;
  z-index: 5;
  background: rgba(0, 0, 0, 0.38);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  pointer-events: none;
}
#lockOverlay .lock-icon {
  font-size: 64px;
  line-height: 1;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.8));
}
#lockOverlay .lock-msg {
  font-size: 22px;
  font-weight: bold;
  color: #ffffff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.9);
  text-align: center;
  max-width: 420px;
  line-height: 1.4;
}
#lockOverlay .lock-sub {
  font-size: 15px;
  color: rgba(255,255,255,0.7);
  text-align: center;
}
</style>
</head>
<body>

<div id="lockOverlay">
  <div class="lock-icon">🔒</div>
  <div class="lock-msg">Upload a car texture to start driving</div>
  <div class="lock-sub">Use the "Car Texture" file picker in the top-left panel</div>
</div>

<div id="uiPanel">
  <label>Car Texture
    <input type="file" id="carTextureUpload">
  </label>
  <label>Building Texture
    <input type="file" id="buildingTextureUpload">
  </label>
  <label>Skybox / 360 Background
    <input type="file" id="skyboxUpload">
  </label>
  <label>Ground Texture
    <input type="file" id="groundUpload">
  </label>
  <label>Sunlight Color
    <input type="color" id="lightColor" value="#ffffff">
  </label>
  <button id="screenshotBtn" style="padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;">
    Screenshot
  </button>
  <div id="info">
    W/S = Drive<br>
    A/D = Turn<br>
    Space = Drift<br>
    Drag Mouse = Look Around
  </div>
  <div id="lapDisplay" style="font-size:13px; color:#222; margin-top:4px; line-height:1.8;">
    <div>Current: <span id="currentLap">0:00.000</span></div>
    <div>Best:&nbsp;&nbsp;&nbsp;&nbsp;<span id="bestLap">--:--.---</span></div>
  </div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "./build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';

// ─── SCENE ───────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xbfd1e5, 80, 600);

// ─── DRIVE LOCK ──────────────────────────────────────────
let carTextureApplied = false;
const lockOverlay = document.getElementById('lockOverlay');

// ─── CAMERA ──────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 3000
);

// ─── RENDERER ────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFShadowMap;
document.body.appendChild(renderer.domElement);

// ─── LIGHTING ────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 3);
directionalLight.position.set(100, 200, 100);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.set(4096, 4096);
directionalLight.shadow.camera.near = 1;
directionalLight.shadow.camera.far = 800;
directionalLight.shadow.camera.left   = -350;
directionalLight.shadow.camera.right  =  200;
directionalLight.shadow.camera.top    =  250;
directionalLight.shadow.camera.bottom = -200;
directionalLight.shadow.bias = -0.0005;
scene.add(directionalLight);

// ─── LOADERS ─────────────────────────────────────────────
const textureLoader = new THREE.TextureLoader();
const gltfLoader   = new GLTFLoader();

// ─── SKYBOX ──────────────────────────────────────────────
textureLoader.load('RMSField.png', (tex) => {
  tex.mapping = THREE.EquirectangularReflectionMapping;
  scene.background = tex;
});

// ─── GROUND ──────────────────────────────────────────────
const grassTexture = textureLoader.load('RMSgrass.png');
grassTexture.wrapS = THREE.RepeatWrapping;
grassTexture.wrapT = THREE.RepeatWrapping;
grassTexture.repeat.set(300, 300);

const groundMaterial = new THREE.MeshStandardMaterial({ map: grassTexture });
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(6000, 6000),
  groundMaterial
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ─── CAR STATE ───────────────────────────────────────────
let carModel = null;

let frontWheelPivot   = null;
let frontWheelSpinner = null;
let frontWheelMesh    = null;
let backWheelPivot    = null;
let backWheelSpinner  = null;

let wheelSteer = 0;
const maxWheelSteer   = 0.3;
const wheelSpinFactor = 0.4;

// ─── PIVOT HELPER ────────────────────────────────────────
function makeWheelPivot(wheel) {
  const pivot = new THREE.Group();
  const parent = wheel.parent;

  const box = new THREE.Box3().setFromObject(wheel);
  const worldCenter = new THREE.Vector3();
  box.getCenter(worldCenter);

  const localCenter = parent.worldToLocal(worldCenter.clone());

  parent.add(pivot);
  pivot.position.copy(localCenter);

  parent.remove(wheel);
  wheel.position.sub(localCenter);
  pivot.add(wheel);

  return pivot;
}

// ─── LOAD CAR ────────────────────────────────────────────
gltfLoader.load('Car.glb', (gltf) => {
  carModel = gltf.scene;
  carModel.scale.set(1, 1, 1);
  carModel.position.set(-54, 0, 0);
  carModel.rotation.y = Math.PI / 2;

  const box = new THREE.Box3().setFromObject(carModel);
  carModel.position.y -= box.min.y;
  carModel.position.y += 0.38;

  carModel.traverse((child) => {
    if (child.isMesh) {
      child.castShadow    = true;
      child.receiveShadow = true;
    }
  });

  scene.add(carModel);
  smoothedCarPos.copy(carModel.position);

  carModel.updateMatrixWorld(true);

  const tireFront = carModel.getObjectByName('tire1_4');
  const tireBack  = carModel.getObjectByName('tire2_2');

  if (tireFront) {
    frontWheelMesh    = tireFront;
    frontWheelPivot   = makeWheelPivot(tireFront);
    frontWheelSpinner = new THREE.Group();
    frontWheelPivot.add(frontWheelSpinner);
    frontWheelPivot.remove(tireFront);
    frontWheelSpinner.add(tireFront);
  } else {
    console.warn('Front wheel node "tire1_4" not found in GLB.');
  }

  if (tireBack) {
    backWheelPivot   = makeWheelPivot(tireBack);
    backWheelSpinner = new THREE.Group();
    backWheelPivot.add(backWheelSpinner);
    backWheelPivot.remove(tireBack);
    backWheelSpinner.add(tireBack);
  } else {
    console.warn('Back wheel node "tire2_2" not found in GLB.');
  }
});

// ─── COLLISION ───────────────────────────────────────────
const aabbObstacles = [];
const aabbModels    = [];
const _carBox       = new THREE.Box3();
const _meshBox      = new THREE.Box3();

function registerAabbModel(model) { aabbModels.push(model); }

function updateAabbObstacles() {
  aabbObstacles.length = 0;
  for (const model of aabbModels) {
    model.traverse((child) => {
      if (child.isMesh) {
        _meshBox.setFromObject(child);
        aabbObstacles.push(_meshBox.clone());
      }
    });
  }
}

const BOUNCE      = 0.4;
const CAR_INSET_X = 0.7;
const CAR_INSET_Z = 1.0;

function resolveAabb() {
  if (!carModel) return;
  _carBox.setFromObject(carModel);
  _carBox.min.x += CAR_INSET_X; _carBox.max.x -= CAR_INSET_X;
  _carBox.min.z += CAR_INSET_Z; _carBox.max.z -= CAR_INSET_Z;

  for (const box of aabbObstacles) {
    if (!_carBox.intersectsBox(box)) continue;
    const overlapX = Math.min(_carBox.max.x - box.min.x, box.max.x - _carBox.min.x);
    const overlapZ = Math.min(_carBox.max.z - box.min.z, box.max.z - _carBox.min.z);
    if (overlapX < overlapZ) {
      const dir = _carBox.getCenter(new THREE.Vector3()).x < box.getCenter(new THREE.Vector3()).x ? -1 : 1;
      carModel.position.x += dir * overlapX;
    } else {
      const dir = _carBox.getCenter(new THREE.Vector3()).z < box.getCenter(new THREE.Vector3()).z ? -1 : 1;
      carModel.position.z += dir * overlapZ;
    }
    speed = -speed * BOUNCE;
    _carBox.setFromObject(carModel);
    _carBox.min.x += CAR_INSET_X; _carBox.max.x -= CAR_INSET_X;
    _carBox.min.z += CAR_INSET_Z; _carBox.max.z -= CAR_INSET_Z;
  }
}

// ── Raycasting (wall) ────────────────────────────────────
const wallMeshes = [];
const _raycaster = new THREE.Raycaster();

const RAY_ORIGIN_Y = 2.0;
const RAY_DOWN     = new THREE.Vector3(0, -1, 0);
const RAY_FAR      = RAY_ORIGIN_Y + 0.5;

const CAR_HALF_W = 1.0;
const CAR_HALF_L = 1.8;
const SAMPLE_OFFSETS_LOCAL = [
  new THREE.Vector3( 0,           0,  0           ),
  new THREE.Vector3( CAR_HALF_W,  0,  0           ),
  new THREE.Vector3(-CAR_HALF_W,  0,  0           ),
  new THREE.Vector3( 0,           0, -CAR_HALF_L  ),
  new THREE.Vector3( 0,           0,  CAR_HALF_L  ),
  new THREE.Vector3( CAR_HALF_W,  0, -CAR_HALF_L  ),
  new THREE.Vector3(-CAR_HALF_W,  0, -CAR_HALF_L  ),
  new THREE.Vector3( CAR_HALF_W,  0,  CAR_HALF_L  ),
  new THREE.Vector3(-CAR_HALF_W,  0,  CAR_HALF_L  ),
];

let _rayDebugFrame = 0;
function resolveWallRaycasts() {
  if (!carModel || wallMeshes.length === 0) return;

  _rayDebugFrame++;
  const doLog = _rayDebugFrame % 60 === 0;

  const carPos  = carModel.position;
  const carQuat = carModel.quaternion;

  for (const localOffset of SAMPLE_OFFSETS_LOCAL) {
    const worldOffset = localOffset.clone().applyQuaternion(carQuat);
    const origin = new THREE.Vector3(
      carPos.x + worldOffset.x,
      RAY_ORIGIN_Y,
      carPos.z + worldOffset.z
    );

    _raycaster.set(origin, RAY_DOWN);
    _raycaster.far = RAY_FAR;

    const hits = _raycaster.intersectObjects(wallMeshes, false);
    if (doLog && hits.length > 0) {
      console.log('impactRatio:', Math.abs(new THREE.Vector3(0,0,-1).applyQuaternion(carModel.quaternion).dot(hits[0].face.normal.clone().transformDirection(hits[0].object.matrixWorld))).toFixed(3));
    }
    if (hits.length === 0) continue;

    const hit        = hits[0];
    const wallNormal = hit.face.normal.clone()
      .transformDirection(hit.object.matrixWorld);
    wallNormal.y = 0;
    if (wallNormal.lengthSq() < 0.0001) continue;
    wallNormal.normalize();

    const toHit = new THREE.Vector3(carPos.x - hit.point.x, 0, carPos.z - hit.point.z);
    if (wallNormal.dot(toHit) < 0) wallNormal.negate();

    const facingDir   = new THREE.Vector3(0, 0, -1).applyQuaternion(carModel.quaternion);
    const impactRatio = Math.abs(facingDir.dot(wallNormal));

    if (impactRatio < 0.5) {
      speed *= (1.0 - impactRatio * 0.6);
      lateralVel.set(0, 0, 0);
      const reflectAngle = impactRatio * 1.4;
      const wallSide     = facingDir.clone().cross(wallNormal).y;
      carModel.rotation.y += reflectAngle * Math.sign(wallSide);
    } else {
      const retention = (1.0 - (impactRatio - 0.5) * 0.8) * 0.25;
      speed = -speed * Math.max(0, retention);
      const deflectAngle = (impactRatio - 0.5) * 1.8;
      const wallSide = facingDir.clone().cross(wallNormal).y;
      const side = Math.abs(wallSide) > 0.01 ? Math.sign(wallSide) : 1;
      carModel.rotation.y += deflectAngle * side;
      lateralVel.set(0, 0, 0);
    }

    const pushDist = localOffset.length() + 0.3;
    carModel.position.addScaledVector(wallNormal, pushDist);
    break;
  }
}

// ─── BUILDING ────────────────────────────────────────────
let buildingModel;
gltfLoader.load('Tower.glb', (gltf) => {
  buildingModel = gltf.scene;
  buildingModel.position.set(-60, 0, -40);
  buildingModel.scale.set(1.8, 1.8, 1.8);
  buildingModel.traverse((child) => {
    if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
  });
  scene.add(buildingModel);
  registerAabbModel(buildingModel);
});

// ─── TRACK ───────────────────────────────────────────────
let trackModel;
let finishLineBox     = null;
let hasLeftFinishLine = false;

gltfLoader.load('Track.glb', (gltf) => {
  trackModel = gltf.scene;
  trackModel.position.y = 0.76;

  trackModel.traverse((child) => {
    if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
  });
  scene.add(trackModel);
  trackModel.updateMatrixWorld(true);

  const wallNode = trackModel.getObjectByName('Wall');
  if (wallNode) {
    wallNode.traverse((child) => {
      if (child.isMesh) wallMeshes.push(child);
    });
  } else {
    console.warn('Wall node not found in Track.glb');
  }

  const finishNode = trackModel.getObjectByName('Finishline');
  if (finishNode) {
    finishLineBox = new THREE.Box3().setFromObject(finishNode);
    finishLineBox.min.y -= 1;
    finishLineBox.max.y += 1;
    finishNode.visible = false;
  }
});

// ─── TEXTURE HELPERS ─────────────────────────────────────
function applyTexture(model, texture) {
  texture.flipY = false;
  model.traverse((child) => {
    if (child.isMesh) {
      child.material.map = texture;
      child.material.needsUpdate = true;
    }
  });
}

// ─── INPUT ───────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup',   (e) => keys[e.key.toLowerCase()] = false);

// ─── MOUSE LOOK ──────────────────────────────────────────
let mouseDown = false;
let yaw   = 0;
let pitch = 0;
const sensitivity = 0.004;

window.addEventListener('mousedown', () => mouseDown = true);
window.addEventListener('mouseup',   () => mouseDown = false);

window.addEventListener('mousemove', (e) => {
  if (!mouseDown) return;
  yaw   -= e.movementX * sensitivity;
  pitch -= e.movementY * sensitivity;
  pitch  = Math.max(-0.8, Math.min(0.35, pitch));
});

// ─── DRIVING PHYSICS ─────────────────────────────────────
// All constants are expressed as per-frame values at 60 fps.
// They are multiplied by `delta` each frame so behaviour is identical
// at any framerate — a 120 fps machine is no faster than a 30 fps one.
let speed        = 0;
const maxSpeed      = 0.42;
const acceleration  = 0.004;
const friction      = 0.004;
const turnSpeed     = 0.032;

// ─── DRIFT STATE ─────────────────────────────────────────
let lateralVel   = new THREE.Vector3(0, 0, 0);
const DRIFT_GRIP        = 0.18;
const DRIFT_GRIP_SLIDE  = 0.04;
const DRIFT_BUILDUP     = 0.035;
const DRIFT_TURN_BOOST  = 1.5;
const NATURAL_BLEED     = 0.012;
const DRIFT_FRICTION    = 0.0015;

// ─── CAMERA OFFSETS ──────────────────────────────────────
const baseOffset = new THREE.Vector3(0, 3, 8);
const lookOffset = new THREE.Vector3(0, 1, 0);
const smoothedCarPos = new THREE.Vector3();

const _spinAxis = new THREE.Vector3(1, 0, 0);
const _spinQ = new THREE.Quaternion();

// ─── LAP TIMER ───────────────────────────────────────────
const currentLapEl = document.getElementById('currentLap');
const bestLapEl    = document.getElementById('bestLap');

let lapStartTime  = null;
let bestLapMs     = null;

const checkpointBox = new THREE.Box3(
  new THREE.Vector3(-148, -2, 16),
  new THREE.Vector3( -94,  4, 37)
);
let checkpointCleared = false;

function formatTime(ms) {
  const m   = Math.floor(ms / 60000);
  const s   = Math.floor((ms % 60000) / 1000);
  const mil = Math.floor(ms % 1000);
  return `${m}:${String(s).padStart(2,'0')}.${String(mil).padStart(3,'0')}`;
}

function updateLapTimer() {
  if (lapStartTime === null) return;
  currentLapEl.textContent = formatTime(performance.now() - lapStartTime);
}

// ─── STEERING STATE ──────────────────────────────────────
let steerRate = 0;
const STEER_BUILDUP  = 0.14;
const STEER_FALLOFF  = 0.18;

// ─── DELTA TIME ──────────────────────────────────────────
// `delta` normalises physics to 60 fps regardless of actual framerate.
// A 120 fps device gets delta ~0.5 per frame; a 30 fps device gets delta ~2.0.
// The result: the car travels the same distance per real second on every device.
// Clamped to 3x so a backgrounded/stalled tab doesn't lurch forward on resume.
let lastTime = null;

function animate() {
  requestAnimationFrame(animate);

  const now   = performance.now();
  const delta = lastTime === null
    ? 1                                           // first frame — assume 60 fps
    : Math.min((now - lastTime) / (1000 / 60), 3); // clamp runaway delta
  lastTime = now;

  if (carModel && carTextureApplied) {

    // ── Acceleration & friction ─────────────────────────
    if (keys['w']) {
      speed += acceleration * delta;
    } else if (keys['s']) {
      speed -= acceleration * delta;
    } else {
      if      (speed >  friction * delta) speed -= friction * delta;
      else if (speed < -friction * delta) speed += friction * delta;
      else speed = 0;
    }
    speed = Math.max(-maxSpeed, Math.min(maxSpeed, speed));

    // ── Drift logic ─────────────────────────────────────
    const isDrifting  = keys[' '] && Math.abs(speed) > maxSpeed * 0.3;
    const speedFactor = Math.min(Math.abs(speed) / maxSpeed, 1);
    const turnDir     = speed < 0 ? -1 : 1;

    const activeTurnSpeed = isDrifting
      ? turnSpeed * DRIFT_TURN_BOOST
      : turnSpeed;

    // Steering: lerp rate and rotation are both delta-scaled so they
    // feel identical on Chromebooks and high-end machines.
    const steerInput  = (keys['a'] ? 1 : 0) - (keys['d'] ? 1 : 0);
    const steerTarget = steerInput * activeTurnSpeed * speedFactor * turnDir;
    steerRate += (steerTarget - steerRate) * (steerInput !== 0 ? STEER_BUILDUP : STEER_FALLOFF) * delta;
    carModel.rotation.y += steerRate * delta;

    const facingDir = new THREE.Vector3(0, 0, -1)
      .applyQuaternion(carModel.quaternion);

    const forwardVel = facingDir.clone().multiplyScalar(speed);

    if (isDrifting) {
      const rightDir = new THREE.Vector3(1, 0, 0).applyQuaternion(carModel.quaternion);
      lateralVel.addScaledVector(rightDir, steerInput * DRIFT_BUILDUP * speedFactor * delta);

      const maxLateral = Math.abs(speed) * 0.9;
      if (lateralVel.length() > maxLateral) lateralVel.setLength(maxLateral);

      // Exponential decay: new = old * (1 - k)^delta ~= old * (1 - k*delta) for small k
      lateralVel.multiplyScalar(1 - DRIFT_GRIP_SLIDE * delta);
      speed *= (1 - DRIFT_FRICTION * delta);
    } else {
      if (steerInput !== 0 && Math.abs(speed) > maxSpeed * 0.2) {
        const rightDir = new THREE.Vector3(1, 0, 0).applyQuaternion(carModel.quaternion);
        lateralVel.addScaledVector(rightDir, steerInput * NATURAL_BLEED * speedFactor * delta);
      }
      lateralVel.multiplyScalar(1 - DRIFT_GRIP * delta);
    }

    // Total velocity = forward + lateral slide.
    // `speed` is already framerate-independent (scaled above), so position
    // advances the same distance per second regardless of fps.
    const totalVel = forwardVel.clone().add(lateralVel);
    totalVel.y = 0;
    carModel.position.add(totalVel);

    // ── Collisions ──────────────────────────────────────
    updateAabbObstacles();
    resolveAabb();
    resolveWallRaycasts();

    // ── Lap timer & checkpoint ───────────────────────────
    if (finishLineBox || checkpointBox) {
      _carBox.setFromObject(carModel);

      if (lapStartTime === null && finishLineBox && _carBox.intersectsBox(finishLineBox) && speed > 0) {
        lapStartTime = performance.now();
        hasLeftFinishLine = false;
        checkpointCleared = false;
      }

      if (lapStartTime !== null) {
        if (!checkpointCleared && _carBox.intersectsBox(checkpointBox)) {
          checkpointCleared = true;
        }

        if (finishLineBox && _carBox.intersectsBox(finishLineBox)) {
          if (hasLeftFinishLine && checkpointCleared && speed > 0) {
            const lapMs = performance.now() - lapStartTime;
            if (bestLapMs === null || lapMs < bestLapMs) {
              bestLapMs = lapMs;
              bestLapEl.textContent = formatTime(bestLapMs);
              bestLapEl.style.color = '#007700';
              setTimeout(() => bestLapEl.style.color = '#222', 1500);
            }
            lapStartTime      = performance.now();
            hasLeftFinishLine = false;
            checkpointCleared = false;
          }
        } else {
          hasLeftFinishLine = true;
        }

        updateLapTimer();
      }
    }

    // ── Front wheel: steer + spin ───────────────────────
    if (frontWheelPivot) {
      let steerTarget = 0;
      if (keys['a']) steerTarget =  maxWheelSteer;
      if (keys['d']) steerTarget = -maxWheelSteer;
      if (isDrifting) steerTarget *= 1.5;

      wheelSteer += (steerTarget - wheelSteer) * 0.15 * delta;
      frontWheelPivot.rotation.y = wheelSteer;

      _spinQ.setFromAxisAngle(_spinAxis, -speed * wheelSpinFactor * delta);
      frontWheelSpinner.quaternion.premultiply(_spinQ);
    }

    // ── Back wheel: spin only ───────────────────────────
    if (backWheelSpinner) {
      _spinQ.setFromAxisAngle(_spinAxis, -speed * wheelSpinFactor * delta);
      backWheelSpinner.quaternion.premultiply(_spinQ);
    }

    // ── Camera follow ───────────────────────────────────
    smoothedCarPos.lerp(carModel.position, 0.15 * delta);
    const rot    = new THREE.Euler(pitch, yaw, 0, 'YXZ');
    const offset = baseOffset.clone().applyEuler(rot).applyQuaternion(carModel.quaternion);
    camera.position.lerp(smoothedCarPos.clone().add(offset), 0.12 * delta);
    camera.lookAt(smoothedCarPos.clone().add(lookOffset));
  }

  renderer.render(scene, camera);
}

animate();

// ─── RESIZE ──────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── TEXTURE UPLOADS ─────────────────────────────────────
document.getElementById('carTextureUpload').addEventListener('change', (e) => {
  if (!carModel) return;
  textureLoader.load(URL.createObjectURL(e.target.files[0]), (tex) => {
    applyTexture(carModel, tex);
    if (!carTextureApplied) {
      carTextureApplied = true;
      lockOverlay.style.display = 'none';
    }
  });
});

document.getElementById('buildingTextureUpload').addEventListener('change', (e) => {
  if (!buildingModel) return;
  textureLoader.load(URL.createObjectURL(e.target.files[0]),
    (tex) => applyTexture(buildingModel, tex));
});

document.getElementById('skyboxUpload').addEventListener('change', (e) => {
  textureLoader.load(URL.createObjectURL(e.target.files[0]), (tex) => {
    tex.mapping = THREE.EquirectangularReflectionMapping;
    scene.background = tex;
  });
});

document.getElementById('groundUpload').addEventListener('change', (e) => {
  textureLoader.load(URL.createObjectURL(e.target.files[0]), (tex) => {
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(300, 300);
    groundMaterial.map = tex;
    groundMaterial.needsUpdate = true;
  });
});

document.getElementById('lightColor').addEventListener('input', (e) => {
  directionalLight.color.set(e.target.value);
});

// ─── SCREENSHOT ──────────────────────────────────────────
document.getElementById('screenshotBtn').addEventListener('click', () => {
  renderer.render(scene, camera);

  const gl = renderer.domElement;
  const w  = gl.width;
  const h  = gl.height;

  const composite = document.createElement('canvas');
  composite.width  = w;
  composite.height = h;
  const ctx = composite.getContext('2d');

  ctx.drawImage(gl, 0, 0);

  // ── Best lap overlay ─────────────────────────────────
  const bestText = bestLapMs !== null
    ? `Best Lap  ${formatTime(bestLapMs)}`
    : 'Best Lap  --:--.---';

  const padding   = Math.round(w * 0.018);
  const fontSize  = Math.round(w * 0.022);
  const lineH     = fontSize + Math.round(fontSize * 0.5);
  const boxPad    = Math.round(fontSize * 0.55);

  ctx.font = `bold ${fontSize}px Arial, sans-serif`;
  ctx.textBaseline = 'top';

  const textW = ctx.measureText(bestText).width;
  const boxX  = padding;
  const boxY  = padding;
  const boxW  = textW + boxPad * 2;
  const boxH  = lineH + boxPad * 1.2;

  ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
  const r = Math.round(boxH * 0.35);
  ctx.beginPath();
  ctx.moveTo(boxX + r, boxY);
  ctx.lineTo(boxX + boxW - r, boxY);
  ctx.quadraticCurveTo(boxX + boxW, boxY, boxX + boxW, boxY + r);
  ctx.lineTo(boxX + boxW, boxY + boxH - r);
  ctx.quadraticCurveTo(boxX + boxW, boxY + boxH, boxX + boxW - r, boxY + boxH);
  ctx.lineTo(boxX + r, boxY + boxH);
  ctx.quadraticCurveTo(boxX, boxY + boxH, boxX, boxY + boxH - r);
  ctx.lineTo(boxX, boxY + r);
  ctx.quadraticCurveTo(boxX, boxY, boxX + r, boxY);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.shadowColor   = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur    = 6;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;

  ctx.fillStyle = '#ffffff';
  ctx.fillText(bestText, boxX + boxPad, boxY + boxPad * 0.6);

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur  = 0;

  const link = document.createElement('a');
  link.download = 'screenshot.png';
  link.href = composite.toDataURL('image/png');
  link.click();
});
</script>
</body>
</html>
