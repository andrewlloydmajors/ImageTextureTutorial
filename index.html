<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Texture Mapping World</title>

<style>

body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
}

#uiPanel {

  position: absolute;
  top: 10px;
  left: 10px;

  z-index: 10;

  background: rgba(255,255,255,0.92);

  padding: 14px;

  border-radius: 12px;

  display: flex;
  flex-direction: column;

  gap: 10px;

  max-width: 250px;
}

#uiPanel label {
  display: flex;
  flex-direction: column;
  font-size: 14px;
  gap: 4px;
}

#info {
  font-size: 13px;
  color: #333;
  margin-top: 6px;
  line-height: 1.4;
}

</style>
</head>

<body>

<div id="uiPanel">

  <label>
    Car Texture
    <input type="file" id="carTextureUpload" accept="image/png, image/jpeg">
  </label>

  <label>
    Building Texture
    <input type="file" id="buildingTextureUpload" accept="image/png, image/jpeg">
  </label>

  <label>
    Skybox / 360 Background
    <input type="file" id="skyboxUpload" accept="image/png, image/jpeg">
  </label>

  <label>
    Ground Texture
    <input type="file" id="groundUpload" accept="image/png, image/jpeg">
  </label>

  <label>
    Sunlight Color
    <input type="color" id="lightColor" value="#ffffff">
  </label>

  <div id="info">
    W/S = Drive<br>
    A/D = Turn<br>
    Drag Mouse = Rotate Camera
  </div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "./build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from 'three';

import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';



// ----------------------------------------------------
// SCENE
// ----------------------------------------------------

const scene = new THREE.Scene();

scene.fog = new THREE.Fog(0xbfd1e5, 80, 600);



// ----------------------------------------------------
// CAMERA
// ----------------------------------------------------

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  3000
);

camera.position.set(0, 3, 8);



// ----------------------------------------------------
// RENDERER
// ----------------------------------------------------

const renderer = new THREE.WebGLRenderer({
  antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);

renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);



// ----------------------------------------------------
// LIGHTING
// ----------------------------------------------------

const ambientLight = new THREE.AmbientLight(0xffffff, 2);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 3);
directionalLight.position.set(5, 10, 7);
scene.add(directionalLight);



// ----------------------------------------------------
// LOADERS
// ----------------------------------------------------

const textureLoader = new THREE.TextureLoader();
const gltfLoader = new GLTFLoader();



// ----------------------------------------------------
// SKYBOX
// ----------------------------------------------------

textureLoader.load('RMSField.png', (bgTexture) => {

  bgTexture.mapping = THREE.EquirectangularReflectionMapping;

  scene.background = bgTexture;
  scene.environment = bgTexture;

});



// ----------------------------------------------------
// GROUND
// ----------------------------------------------------

const grassTexture = textureLoader.load('RMSgrass.png');

grassTexture.wrapS = THREE.RepeatWrapping;
grassTexture.wrapT = THREE.RepeatWrapping;
grassTexture.repeat.set(300, 300);

const groundMaterial = new THREE.MeshStandardMaterial({
  map: grassTexture
});

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(6000, 6000),
  groundMaterial
);

ground.rotation.x = -Math.PI / 2;
scene.add(ground);



// ----------------------------------------------------
// CAR
// ----------------------------------------------------

let carModel;

gltfLoader.load('Car.glb', (gltf) => {

  carModel = gltf.scene;

  carModel.scale.set(1, 1, 1);
  carModel.position.set(0, 0.5, 0);

  scene.add(carModel);

});



// ----------------------------------------------------
// BUILDING
// ----------------------------------------------------

let buildingModel;

gltfLoader.load('Tower.glb', (gltf) => {

  buildingModel = gltf.scene;

  buildingModel.position.set(15, 0, -15);

  scene.add(buildingModel);

});



// ----------------------------------------------------
// TEXTURE HELPERS
// ----------------------------------------------------

function applyTexture(model, texture) {

  texture.flipY = false;

  model.traverse((child) => {

    if (child.isMesh) {

      child.material.map = texture;
      child.material.needsUpdate = true;

    }

  });

}



// ----------------------------------------------------
// INPUT
// ----------------------------------------------------

const keys = {};

window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);



let speed = 0;
let maxSpeed = 0.25;
let acceleration = 0.006;
let deceleration = 0.004;
let friction = 0.003;
let turnSpeed = 0.04;

function animate() {

  requestAnimationFrame(animate);

  if (carModel) {

    // -----------------------------
    // ACCELERATION / BRAKING
    // -----------------------------
    if (keys['w']) {
      speed += acceleration;
    } 
    else if (keys['s']) {
      speed -= acceleration;
    } 
    else {
      // natural friction when no input
      if (speed > 0) speed -= friction;
      if (speed < 0) speed += friction;
    }

    // clamp speed
    speed = Math.max(-maxSpeed, Math.min(maxSpeed, speed));



    // -----------------------------
    // STEERING (more realistic at speed)
    // -----------------------------
    const speedFactor = Math.min(Math.abs(speed) / maxSpeed, 1);

    if (keys['a']) {
      carModel.rotation.y += turnSpeed * speedFactor;
    }

    if (keys['d']) {
      carModel.rotation.y -= turnSpeed * speedFactor;
    }



    // -----------------------------
    // MOVE CAR
    // -----------------------------
    carModel.translateZ(-speed);



    // -----------------------------
    // CAMERA FOLLOW (keep yours)
    // -----------------------------
    const cameraOffset = new THREE.Vector3(0, 3, 8);
    const lookOffset = new THREE.Vector3(0, 1, 0);

    const offset = cameraOffset.clone();
    offset.applyQuaternion(carModel.quaternion);

    const desiredPos = carModel.position.clone().add(offset);

    camera.position.lerp(desiredPos, 0.08);

    const lookTarget = carModel.position.clone().add(lookOffset);
    camera.lookAt(lookTarget);

  }

  renderer.render(scene, camera);
}

animate();


// ----------------------------------------------------
// RESIZE
// ----------------------------------------------------

window.addEventListener('resize', () => {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);

});



// ----------------------------------------------------
// TEXTURE UPLOADS
// ----------------------------------------------------

document.getElementById('carTextureUpload').addEventListener('change', (e) => {

  if (!carModel) return;

  const url = URL.createObjectURL(e.target.files[0]);

  textureLoader.load(url, (tex) => applyTexture(carModel, tex));

});

document.getElementById('buildingTextureUpload').addEventListener('change', (e) => {

  if (!buildingModel) return;

  const url = URL.createObjectURL(e.target.files[0]);

  textureLoader.load(url, (tex) => applyTexture(buildingModel, tex));

});

document.getElementById('skyboxUpload').addEventListener('change', (e) => {

  const url = URL.createObjectURL(e.target.files[0]);

  textureLoader.load(url, (tex) => {

    tex.mapping = THREE.EquirectangularReflectionMapping;

    scene.background = tex;
    scene.environment = tex;

  });

});

document.getElementById('groundUpload').addEventListener('change', (e) => {

  const url = URL.createObjectURL(e.target.files[0]);

  textureLoader.load(url, (tex) => {

    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(300, 300);

    groundMaterial.map = tex;
    groundMaterial.needsUpdate = true;

  });

});

document.getElementById('lightColor').addEventListener('input', (e) => {

  directionalLight.color.set(e.target.value);

});

</script>

</body>
</html>
