<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Car Drive</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
}

#uiPanel {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
  background: rgba(255,255,255,0.92);
  padding: 14px;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 250px;
}

#uiPanel label {
  display: flex;
  flex-direction: column;
  font-size: 14px;
  gap: 4px;
}

#info {
  font-size: 13px;
  color: #333;
  margin-top: 6px;
  line-height: 1.6;
}

#timer {
  font-size: 18px;
  font-weight: bold;
  color: #111;
}
</style>
</head>

<body>

<div id="uiPanel">
  <label>Car Texture
    <input type="file" id="carTextureUpload">
  </label>

  <label>Building Texture
    <input type="file" id="buildingTextureUpload">
  </label>

  <label>Skybox / 360 Background
    <input type="file" id="skyboxUpload">
  </label>

  <label>Ground Texture
    <input type="file" id="groundUpload">
  </label>

  <label>Sunlight Color
    <input type="color" id="lightColor" value="#ffffff">
  </label>

  <div id="info">
    W/S = Drive<br>
    A/D = Turn<br>
    Drag Mouse = Look Around<br><br>

    <span id="timer">Time: 0.00</span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "./build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from 'three';
import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';


// ─────────────────────────────
// SCENE
// ─────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xbfd1e5, 80, 600);


// ─────────────────────────────
// CAMERA
// ─────────────────────────────
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  3000
);


// ─────────────────────────────
// RENDERER
// ─────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);


// ─────────────────────────────
// LIGHTING
// ─────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 3);
directionalLight.position.set(30, 60, 40);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.set(2048, 2048);
scene.add(directionalLight);


// ─────────────────────────────
// LOADERS
// ─────────────────────────────
const textureLoader = new THREE.TextureLoader();
const gltfLoader = new GLTFLoader();


// ─────────────────────────────
// SKYBOX
// ─────────────────────────────
textureLoader.load('RMSField.png', (tex) => {
  tex.mapping = THREE.EquirectangularReflectionMapping;
  scene.background = tex;
  scene.environment = tex;
});


// ─────────────────────────────
// GROUND
// ─────────────────────────────
const grassTexture = textureLoader.load('RMSgrass.png');
grassTexture.wrapS = THREE.RepeatWrapping;
grassTexture.wrapT = THREE.RepeatWrapping;
grassTexture.repeat.set(300, 300);

const groundMaterial = new THREE.MeshStandardMaterial({
  map: grassTexture
});

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(6000, 6000),
  groundMaterial
);

ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);


// ─────────────────────────────
// CAR STATE
// ─────────────────────────────
let carModel = null;
let frontWheelPivot = null;
let frontWheelSpinner = null;
let backWheelSpinner = null;

let wheelSteer = 0;

const maxWheelSteer = 0.3;
const wheelSpinFactor = 0.4;


// ─────────────────────────────
// RACE
// ─────────────────────────────
let finishLine = null;
const finishBox = new THREE.Box3();
const carBox = new THREE.Box3();

let raceStarted = false;
let raceFinished = false;
let startTime = 0;
let lapTime = 0;
let touchingFinish = false;


// ─────────────────────────────
// COLLISION SYSTEM (FIXED)
// ─────────────────────────────
const obstacleMeshes = [];
const obstacleBoxes = [];

const tempBox = new THREE.Box3();

function registerMeshForCollision(mesh) {
  obstacleMeshes.push(mesh);
}


// ─────────────────────────────
// COLLISION UPDATE
// ─────────────────────────────
function updateCollisions() {
  obstacleBoxes.length = 0;

  for (const mesh of obstacleMeshes) {
    tempBox.setFromObject(mesh);
    obstacleBoxes.push(tempBox.clone());
  }
}


// ─────────────────────────────
// RESOLVE COLLISIONS
// ─────────────────────────────
const BOUNCE = 0.4;

function resolveCollisions(speedRef) {
  if (!carModel) return;

  carBox.setFromObject(carModel);

  for (const box of obstacleBoxes) {
    if (!carBox.intersectsBox(box)) continue;

    const carCenter = carBox.getCenter(new THREE.Vector3());
    const boxCenter = box.getCenter(new THREE.Vector3());

    const dx = carCenter.x - boxCenter.x;
    const dz = carCenter.z - boxCenter.z;

    const overlapX = Math.min(carBox.max.x - box.min.x, box.max.x - carBox.min.x);
    const overlapZ = Math.min(carBox.max.z - box.min.z, box.max.z - carBox.min.z);

    if (overlapX < overlapZ) {
      carModel.position.x += Math.sign(dx) * overlapX;
    } else {
      carModel.position.z += Math.sign(dz) * overlapZ;
    }

    speed = -speed * BOUNCE;
  }
}


// ─────────────────────────────
// LOAD CAR
// ─────────────────────────────
let pendingSpawn = null;

gltfLoader.load('Car.glb', (gltf) => {

  carModel = gltf.scene;
  carModel.scale.set(1, 1, 1);

  const box = new THREE.Box3().setFromObject(carModel);
  carModel.position.y -= box.min.y;

  carModel.traverse((child) => {
    if (child.isMesh) child.castShadow = true;
  });

  scene.add(carModel);

  if (pendingSpawn) carModel.position.copy(pendingSpawn);
});


// ─────────────────────────────
// BUILDING (FIXED COLLISIONS)
// ─────────────────────────────
gltfLoader.load('Tower.glb', (gltf) => {

  const building = gltf.scene;
  building.position.set(15, 0, -15);

  building.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;

      registerMeshForCollision(child);
    }
  });

  scene.add(building);
});


// ─────────────────────────────
// TRACK
// ─────────────────────────────
gltfLoader.load('Track.glb', (gltf) => {

  const track = gltf.scene;

  const trackTexture = textureLoader.load('Track.png');
  trackTexture.flipY = false;

  let spawn = null;

  track.traverse((child) => {

    if (child.isMesh) {
      child.material.map = trackTexture;
      child.material.needsUpdate = true;
      child.castShadow = true;
      child.receiveShadow = true;
    }

    if (child.name === 'Finishline') {
      finishLine = child;
      finishLine.visible = false;

      spawn = new THREE.Vector3();
      finishLine.getWorldPosition(spawn);
    }

    if (child.isMesh && child.name.toLowerCase().includes('wall')) {
      registerMeshForCollision(child);
    }
  });

  scene.add(track);

  if (spawn) {
    pendingSpawn = new THREE.Vector3(spawn.x, 0, spawn.z + 8);
  }
});


// ─────────────────────────────
// INPUT
// ─────────────────────────────
const keys = {};

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);


// ─────────────────────────────
// MOUSE LOOK
// ─────────────────────────────
let yaw = 0, pitch = 0;
let mouseDown = false;

window.addEventListener('mousedown', () => mouseDown = true);
window.addEventListener('mouseup', () => mouseDown = false);

window.addEventListener('mousemove', (e) => {
  if (!mouseDown) return;

  yaw -= e.movementX * 0.004;
  pitch -= e.movementY * 0.004;

  pitch = Math.max(-0.8, Math.min(0.35, pitch));
});


// ─────────────────────────────
// PHYSICS
// ─────────────────────────────
let speed = 0;
const maxSpeed = 0.28;
const accel = 0.007;
const friction = 0.004;
const turnSpeed = 0.04;


// ─────────────────────────────
// CAMERA OFFSETS
// ─────────────────────────────
const baseOffset = new THREE.Vector3(0, 3, 8);
const lookOffset = new THREE.Vector3(0, 1, 0);


// ─────────────────────────────
// ANIMATE
// ─────────────────────────────
function animate() {

  requestAnimationFrame(animate);

  if (carModel) {

    if (keys['w']) speed += accel;
    else if (keys['s']) speed -= accel;
    else speed *= 0.98;

    speed = THREE.MathUtils.clamp(speed, -maxSpeed, maxSpeed);

    const turnDir = speed < 0 ? -1 : 1;

    if (keys['a']) carModel.rotation.y += turnSpeed * turnDir;
    if (keys['d']) carModel.rotation.y -= turnSpeed * turnDir;

    carModel.translateZ(-speed);

    updateCollisions();
    resolveCollisions();

    // FINISH
    if (finishLine) {

      finishBox.setFromObject(finishLine);
      carBox.setFromObject(carModel);

      const touching = carBox.intersectsBox(finishBox);

      if (touching && !touchingFinish) {
        touchingFinish = true;

        if (!raceStarted) {
          raceStarted = true;
          startTime = performance.now();
        } else if (!raceFinished) {
          raceFinished = true;
          lapTime = (performance.now() - startTime) / 1000;
        }
      }

      if (!touching) touchingFinish = false;

      const timer = document.getElementById('timer');

      if (raceStarted && !raceFinished) {
        timer.textContent =
          'Time: ' + ((performance.now() - startTime)/1000).toFixed(2);
      }

      if (raceFinished) {
        timer.textContent =
          'Final Time: ' + lapTime.toFixed(2);
      }
    }

    // CAMERA
    const rot = new THREE.Euler(pitch, yaw, 0, 'YXZ');

    const offset = baseOffset.clone()
      .applyEuler(rot)
      .applyQuaternion(carModel.quaternion);

    camera.position.lerp(
      carModel.position.clone().add(offset),
      0.1
    );

    camera.lookAt(carModel.position.clone().add(lookOffset));
  }

  renderer.render(scene, camera);
}

animate();


// ─────────────────────────────
// RESIZE
// ─────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});


// ─────────────────────────────
// TEXTURE UPLOADS
// ─────────────────────────────
document.getElementById('carTextureUpload').onchange = (e) => {
  if (!carModel) return;
  textureLoader.load(URL.createObjectURL(e.target.files[0]), tex => {
    carModel.traverse(c => {
      if (c.isMesh) {
        c.material.map = tex;
        c.material.needsUpdate = true;
      }
    });
  });
};

document.getElementById('buildingTextureUpload').onchange = (e) => {
  textureLoader.load(URL.createObjectURL(e.target.files[0]), tex => {
    obstacleMeshes.forEach(m => {
      m.material.map = tex;
      m.material.needsUpdate = true;
    });
  });
};

document.getElementById('skyboxUpload').onchange = (e) => {
  textureLoader.load(URL.createObjectURL(e.target.files[0]), tex => {
    tex.mapping = THREE.EquirectangularReflectionMapping;
    scene.background = tex;
    scene.environment = tex;
  });
};

document.getElementById('groundUpload').onchange = (e) => {
  textureLoader.load(URL.createObjectURL(e.target.files[0]), tex => {
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(300, 300);
    groundMaterial.map = tex;
    groundMaterial.needsUpdate = true;
  });
};

document.getElementById('lightColor').oninput = (e) => {
  directionalLight.color.set(e.target.value);
};

</script>
</body>
</html>
