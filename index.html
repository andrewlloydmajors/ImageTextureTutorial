<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Texture Mapping World</title>

<style>

body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
}

#uiPanel {

  position: absolute;
  top: 10px;
  left: 10px;

  z-index: 10;

  background: rgba(255,255,255,0.92);

  padding: 14px;

  border-radius: 12px;

  display: flex;
  flex-direction: column;

  gap: 10px;

  max-width: 250px;
}

#uiPanel label {
  display: flex;
  flex-direction: column;
  font-size: 14px;
  gap: 4px;
}

#info {
  font-size: 13px;
  color: #333;
  margin-top: 6px;
  line-height: 1.4;
}

</style>
</head>

<body>

<div id="uiPanel">

  <label>
    Car Texture
    <input type="file" id="carTextureUpload" accept="image/png, image/jpeg">
  </label>

  <label>
    Building Texture
    <input type="file" id="buildingTextureUpload" accept="image/png, image/jpeg">
  </label>

  <label>
    Skybox / 360 Background
    <input type="file" id="skyboxUpload" accept="image/png, image/jpeg">
  </label>

  <label>
    Ground Texture
    <input type="file" id="groundUpload" accept="image/png, image/jpeg">
  </label>

  <label>
    Sunlight Color
    <input type="color" id="lightColor" value="#ffffff">
  </label>

  <div id="info">
    W/S = Drive<br>
    A/D = Turn<br>
    Drag Mouse = Rotate Camera
  </div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "./build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from 'three';

import { OrbitControls } from './jsm/controls/OrbitControls.js';
import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';



// ----------------------------------------------------
// SCENE
// ----------------------------------------------------

const scene = new THREE.Scene();

scene.fog = new THREE.Fog(0xbfd1e5, 80, 600);



// ----------------------------------------------------
// CAMERA
// ----------------------------------------------------

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  3000
);

camera.position.set(0, 3, 8);



// ----------------------------------------------------
// RENDERER
// ----------------------------------------------------

const renderer = new THREE.WebGLRenderer({
  antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);

renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);



// ----------------------------------------------------
// CONTROLS
// ----------------------------------------------------

const controls = new OrbitControls(camera, renderer.domElement);

controls.target.set(0, 1, 0);

controls.minDistance = 3;
controls.maxDistance = 12;

controls.update();



// ----------------------------------------------------
// LIGHTING
// ----------------------------------------------------

const ambientLight = new THREE.AmbientLight(0xffffff, 2);

scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 3);

directionalLight.position.set(5, 10, 7);

scene.add(directionalLight);



// ----------------------------------------------------
// LOADERS
// ----------------------------------------------------

const textureLoader = new THREE.TextureLoader();
const gltfLoader = new GLTFLoader();



// ----------------------------------------------------
// SKYBOX
// ----------------------------------------------------

textureLoader.load('RMSField.png', (bgTexture) => {

  bgTexture.mapping = THREE.EquirectangularReflectionMapping;

  scene.background = bgTexture;
  scene.environment = bgTexture;

});



// ----------------------------------------------------
// GROUND
// ----------------------------------------------------

const grassTexture = textureLoader.load('RMSgrass.png');

grassTexture.wrapS = THREE.RepeatWrapping;
grassTexture.wrapT = THREE.RepeatWrapping;

grassTexture.repeat.set(300, 300);

grassTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();

const groundMaterial = new THREE.MeshStandardMaterial({
  map: grassTexture
});

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(6000, 6000),
  groundMaterial
);

ground.rotation.x = -Math.PI / 2;

scene.add(ground);



// ----------------------------------------------------
// CAR (GLB)
// ----------------------------------------------------

let carModel;

gltfLoader.load(
  'Car.glb',
  (gltf) => {

    carModel = gltf.scene;

    carModel.scale.set(1, 1, 1);
    carModel.position.set(0, 0.5, 0);

    scene.add(carModel);

    console.log("Car Loaded");

  },
  undefined,
  (error) => console.error(error)
);



// ----------------------------------------------------
// BUILDING (GLB)
// ----------------------------------------------------

let buildingModel;

gltfLoader.load(
  'Tower.glb',
  (gltf) => {

    buildingModel = gltf.scene;

    buildingModel.position.set(15, 0, -15);
    buildingModel.scale.set(1, 1, 1);

    scene.add(buildingModel);

    console.log("Building Loaded");

  },
  undefined,
  (error) => console.error(error)
);



// ----------------------------------------------------
// TEXTURE HELPERS
// ----------------------------------------------------

function applyTexture(model, texture) {

  texture.flipY = false;

  model.traverse((child) => {

    if (child.isMesh) {

      child.material.map = texture;
      child.material.needsUpdate = true;

    }

  });

}



// ----------------------------------------------------
// CAR TEXTURE
// ----------------------------------------------------

document.getElementById('carTextureUpload')
.addEventListener('change', (e) => {

  if (!carModel) return;

  const file = e.target.files[0];
  const url = URL.createObjectURL(file);

  textureLoader.load(url, (tex) => {
    applyTexture(carModel, tex);
  });

});



// ----------------------------------------------------
// BUILDING TEXTURE
// ----------------------------------------------------

document.getElementById('buildingTextureUpload')
.addEventListener('change', (e) => {

  if (!buildingModel) return;

  const file = e.target.files[0];
  const url = URL.createObjectURL(file);

  textureLoader.load(url, (tex) => {
    applyTexture(buildingModel, tex);
  });

});



// ----------------------------------------------------
// SKYBOX UPLOAD
// ----------------------------------------------------

document.getElementById('skyboxUpload')
.addEventListener('change', (e) => {

  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);

  textureLoader.load(url, (tex) => {

    tex.mapping = THREE.EquirectangularReflectionMapping;

    scene.background = tex;
    scene.environment = tex;

  });

});



// ----------------------------------------------------
// GROUND TEXTURE
// ----------------------------------------------------

document.getElementById('groundUpload')
.addEventListener('change', (e) => {

  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);

  textureLoader.load(url, (tex) => {

    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(300, 300);

    groundMaterial.map = tex;
    groundMaterial.needsUpdate = true;

  });

});



// ----------------------------------------------------
// LIGHT COLOR
// ----------------------------------------------------

document.getElementById('lightColor')
.addEventListener('input', (e) => {

  directionalLight.color.set(e.target.value);

});



// ----------------------------------------------------
// RESIZE
// ----------------------------------------------------

window.addEventListener('resize', () => {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);

});



// ----------------------------------------------------
// INPUT
// ----------------------------------------------------

const keys = {};

window.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
});

window.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
});



// ----------------------------------------------------
// MOVEMENT
// ----------------------------------------------------

let speed = 0;

function animate() {

  requestAnimationFrame(animate);

  if (carModel) {

    if (keys['w']) speed = 0.08;
    else if (keys['s']) speed = -0.05;
    else speed = 0;

    if (keys['a']) carModel.rotation.y += 0.03;
    if (keys['d']) carModel.rotation.y -= 0.03;

    carModel.translateZ(speed);
  }

  renderer.render(scene, camera);

}

animate();

</script>

</body>
</html>
