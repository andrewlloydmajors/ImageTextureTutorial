<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Texture Mapping World</title>

<style>

body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
}

#uiPanel {

  position: absolute;
  top: 10px;
  left: 10px;

  z-index: 10;

  background: rgba(255,255,255,0.92);

  padding: 14px;

  border-radius: 12px;

  display: flex;
  flex-direction: column;

  gap: 10px;

  max-width: 250px;
}

#uiPanel label {
  display: flex;
  flex-direction: column;
  font-size: 14px;
  gap: 4px;
}

#info {
  font-size: 13px;
  color: #333;
  margin-top: 6px;
  line-height: 1.4;
}

</style>
</head>

<body>

<div id="uiPanel">

  <label>
    Car Texture
    <input type="file" id="carTextureUpload" accept="image/png, image/jpeg">
  </label>

  <label>
    Building Texture
    <input type="file" id="buildingTextureUpload" accept="image/png, image/jpeg">
  </label>

  <label>
    Skybox / 360 Background
    <input type="file" id="skyboxUpload" accept="image/png, image/jpeg">
  </label>

  <label>
    Ground Texture
    <input type="file" id="groundUpload" accept="image/png, image/jpeg">
  </label>

  <label>
    Sunlight Color
    <input type="color" id="lightColor" value="#ffffff">
  </label>

  <div id="info">
    W/S = Drive<br>
    A/D = Turn<br>
    Drag Mouse = Rotate Camera
  </div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "./build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from 'three';

import { OrbitControls } from './jsm/controls/OrbitControls.js';
import { OBJLoader } from './jsm/loaders/OBJLoader.js';



// ----------------------------------------------------
// SCENE
// ----------------------------------------------------

const scene = new THREE.Scene();

scene.fog = new THREE.Fog(0xbfd1e5, 80, 600);



// ----------------------------------------------------
// CAMERA
// ----------------------------------------------------

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  3000
);

camera.position.set(0, 3, 8);



// ----------------------------------------------------
// RENDERER
// ----------------------------------------------------

const renderer = new THREE.WebGLRenderer({
  antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);

renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);



// ----------------------------------------------------
// CONTROLS
// ----------------------------------------------------

const controls = new OrbitControls(camera, renderer.domElement);

controls.target.set(0, 1, 0);

controls.minDistance = 3;
controls.maxDistance = 12;

controls.update();



// ----------------------------------------------------
// LIGHTING
// ----------------------------------------------------

const ambientLight = new THREE.AmbientLight(0xffffff, 2);

scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 3);

directionalLight.position.set(5, 10, 7);

scene.add(directionalLight);




// ----------------------------------------------------
// TEXTURE LOADER
// ----------------------------------------------------

const textureLoader = new THREE.TextureLoader();



// ----------------------------------------------------
// DEFAULT SKYBOX
// ----------------------------------------------------

textureLoader.load('RMSField.png', (bgTexture) => {

  bgTexture.mapping = THREE.EquirectangularReflectionMapping;

  scene.background = bgTexture;

  scene.environment = bgTexture;

});



// ----------------------------------------------------
// GROUND
// ----------------------------------------------------

const grassTexture = textureLoader.load('RMSgrass.png');

grassTexture.wrapS = THREE.RepeatWrapping;
grassTexture.wrapT = THREE.RepeatWrapping;

grassTexture.repeat.set(300, 300);

grassTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();

const groundMaterial = new THREE.MeshStandardMaterial({
  map: grassTexture
});

const ground = new THREE.Mesh(

  new THREE.PlaneGeometry(6000, 6000),

  groundMaterial

);

ground.rotation.x = -Math.PI / 2;

scene.add(ground);



// ----------------------------------------------------
// OBJ LOADER
// ----------------------------------------------------

const objLoader = new OBJLoader();



// ----------------------------------------------------
// LOAD CAR MODEL
// ----------------------------------------------------

let carModel;

objLoader.load(

  'Car.obj',

  (obj) => {

    carModel = obj;

    // IMPORTANT:
    // OBJ models often need scale adjustments

    carModel.scale.set(1, 1, 1);

    // Lift slightly above ground

    carModel.position.set(0, 0.5, 0);

    // OBJ models are often rotated weirdly

    // carModel.rotation.x = -Math.PI / 2;

    scene.add(carModel);

    console.log("Car Loaded");

  },

  undefined,

  (error) => {

    console.error("Car Error:", error);

  }

);



// ----------------------------------------------------
// LOAD BUILDING MODEL
// ----------------------------------------------------

let buildingModel;

objLoader.load(

  'Tower.obj',

  (obj) => {

    buildingModel = obj;

    buildingModel.position.set(15, 0, -15);

    buildingModel.scale.set(1, 1, 1);

    scene.add(buildingModel);

    console.log("Building Loaded");

  },

  undefined,

  (error) => {

    console.error("Building Error:", error);

  }

);



// ----------------------------------------------------
// CAR TEXTURE UPLOAD
// ----------------------------------------------------

const carTextureUpload = document.getElementById('carTextureUpload');

carTextureUpload.addEventListener('change', (event) => {

  const file = event.target.files[0];

  if (!file || !carModel) return;

  const imageURL = URL.createObjectURL(file);

  textureLoader.load(imageURL, (texture) => {

    texture.flipY = false;

    carModel.traverse((child) => {

      if (child.isMesh) {

        child.material.map = texture;

        child.material.needsUpdate = true;

      }

    });

  });

});



// ----------------------------------------------------
// BUILDING TEXTURE UPLOAD
// ----------------------------------------------------

const buildingTextureUpload = document.getElementById('buildingTextureUpload');

buildingTextureUpload.addEventListener('change', (event) => {

  const file = event.target.files[0];

  if (!file || !buildingModel) return;

  const imageURL = URL.createObjectURL(file);

  textureLoader.load(imageURL, (texture) => {

    texture.flipY = false;

    buildingModel.traverse((child) => {

      if (child.isMesh) {

        child.material.map = texture;

        child.material.needsUpdate = true;

      }

    });

  });

});



// ----------------------------------------------------
// SKYBOX UPLOAD
// ----------------------------------------------------

const skyboxUpload = document.getElementById('skyboxUpload');

skyboxUpload.addEventListener('change', (event) => {

  const file = event.target.files[0];

  if (!file) return;

  const imageURL = URL.createObjectURL(file);

  textureLoader.load(imageURL, (texture) => {

    texture.mapping = THREE.EquirectangularReflectionMapping;

    scene.background = texture;

    scene.environment = texture;

  });

});



// ----------------------------------------------------
// GROUND TEXTURE UPLOAD
// ----------------------------------------------------

const groundUpload = document.getElementById('groundUpload');

groundUpload.addEventListener('change', (event) => {

  const file = event.target.files[0];

  if (!file) return;

  const imageURL = URL.createObjectURL(file);

  textureLoader.load(imageURL, (texture) => {

    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;

    texture.repeat.set(300, 300);

    texture.anisotropy = renderer.capabilities.getMaxAnisotropy();

    groundMaterial.map = texture;

    groundMaterial.needsUpdate = true;

  });

});



// ----------------------------------------------------
// LIGHT COLOR PICKER
// ----------------------------------------------------

const lightColorInput = document.getElementById('lightColor');

lightColorInput.addEventListener('input', (event) => {

  directionalLight.color.set(event.target.value);

});



// ----------------------------------------------------
// WINDOW RESIZE
// ----------------------------------------------------

window.addEventListener('resize', () => {

  camera.aspect = window.innerWidth / window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);

});



// ----------------------------------------------------
// KEYBOARD INPUT
// ----------------------------------------------------

const keys = {};

window.addEventListener('keydown', (event) => {

  keys[event.key.toLowerCase()] = true;

});

window.addEventListener('keyup', (event) => {

  keys[event.key.toLowerCase()] = false;

});



// ----------------------------------------------------
// CAR MOVEMENT
// ----------------------------------------------------

let speed = 0;

function animate() {

  requestAnimationFrame(animate);

  if (carModel) {

    // FORWARD / BACKWARD

    if (keys['w']) {

      speed = -0.05;

    }
    else if (keys['s']) {

      speed = 0.08;

    }
    else {

      speed = 0;

    }

    // TURNING

    if (keys['a']) {

      carModel.rotation.y += 0.03;

    }

    if (keys['d']) {

      carModel.rotation.y -= 0.03;

    }

    // MOVE FORWARD

    carModel.translateZ(speed);

  }

  renderer.render(scene, camera);

}

animate();

</script>

</body>
</html>
