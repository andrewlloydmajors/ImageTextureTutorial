<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Texture Mapping World</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}
canvas { display: block; }

#uiPanel {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
  background: rgba(255,255,255,0.92);
  padding: 14px;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 250px;
}
#uiPanel label {
  display: flex;
  flex-direction: column;
  font-size: 14px;
  gap: 4px;
}
#info {
  font-size: 13px;
  color: #333;
  margin-top: 6px;
  line-height: 1.4;
}
</style>
</head>

<body>

<div id="uiPanel">
  <label>
    Car Texture
    <input type="file" id="carTextureUpload">
  </label>

  <label>
    Building Texture
    <input type="file" id="buildingTextureUpload">
  </label>

  <label>
    Skybox / 360 Background
    <input type="file" id="skyboxUpload">
  </label>

  <label>
    Ground Texture
    <input type="file" id="groundUpload">
  </label>

  <label>
    Sunlight Color
    <input type="color" id="lightColor" value="#ffffff">
  </label>

  <div id="info">
    W/S = Drive<br>
    A/D = Turn<br>
    Drag Mouse = Look Around
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "./build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from 'three';
import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';

// ----------------------------------------------------
// SCENE
// ----------------------------------------------------
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xbfd1e5, 80, 600);

// ----------------------------------------------------
// CAMERA
// ----------------------------------------------------
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  3000
);

// ----------------------------------------------------
// RENDERER
// ----------------------------------------------------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// ----------------------------------------------------
// LIGHTING
// ----------------------------------------------------
scene.add(new THREE.AmbientLight(0xffffff, 2));
const directionalLight = new THREE.DirectionalLight(0xffffff, 3);
directionalLight.position.set(5, 10, 7);
scene.add(directionalLight);

// ----------------------------------------------------
// LOADERS
// ----------------------------------------------------
const textureLoader = new THREE.TextureLoader();
const gltfLoader = new GLTFLoader();

// ----------------------------------------------------
// SKYBOX
// ----------------------------------------------------
textureLoader.load('RMSField.png', (tex) => {
  tex.mapping = THREE.EquirectangularReflectionMapping;
  scene.background = tex;
  scene.environment = tex;
});

// ----------------------------------------------------
// GROUND
// ----------------------------------------------------
const grassTexture = textureLoader.load('RMSgrass.png');
grassTexture.wrapS = THREE.RepeatWrapping;
grassTexture.wrapT = THREE.RepeatWrapping;
grassTexture.repeat.set(300, 300);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(6000, 6000),
  new THREE.MeshStandardMaterial({ map: grassTexture })
);

ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// ----------------------------------------------------
// CAR + WHEELS (FIXED PIVOTS)
// ----------------------------------------------------
let carModel;

let frontWheelMesh = null;
let rearWheelMesh = null;

let frontWheelPivot = null;
let rearWheelPivot = null;

let wheelSteer = 0;
let wheelSpin = 0;

const maxSteer = 0.6;

gltfLoader.load('Car.glb', (gltf) => {

  carModel = gltf.scene;

  carModel.scale.set(1, 1, 1);
  carModel.position.set(0, 0.5, 0);

  carModel.traverse((child) => {

    if (child.name === "tire1_4") {
      frontWheelMesh = child;
    }

    if (child.name === "tire2_2") {
      rearWheelMesh = child;
    }

  });

  // ---- FIX: create pivots so rotation is correct ----
  function makePivot(wheelMesh) {

    if (!wheelMesh) return null;

    const pivot = new THREE.Object3D();

    // keep world position
    wheelMesh.getWorldPosition(pivot.position);

    // detach from car and attach to pivot
    wheelMesh.parent.attach(pivot);
    pivot.add(wheelMesh);

    // reset local position so it spins correctly
    wheelMesh.position.set(0, 0, 0);

    return pivot;
  }

  frontWheelPivot = makePivot(frontWheelMesh);
  rearWheelPivot = makePivot(rearWheelMesh);

  if (frontWheelPivot) carModel.add(frontWheelPivot);
  if (rearWheelPivot) carModel.add(rearWheelPivot);

  scene.add(carModel);
});

// ----------------------------------------------------
// BUILDING
// ----------------------------------------------------
let buildingModel;

gltfLoader.load('Tower.glb', (gltf) => {
  buildingModel = gltf.scene;
  buildingModel.position.set(15, 0, -15);
  scene.add(buildingModel);
});

// ----------------------------------------------------
// INPUT
// ----------------------------------------------------
const keys = {};
window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

// ----------------------------------------------------
// MOUSE LOOK
// ----------------------------------------------------
let mouseDown = false;
let yaw = 0;
let pitch = 0;

const sensitivity = 0.004;

window.addEventListener('mousedown', () => mouseDown = true);
window.addEventListener('mouseup', () => mouseDown = false);

window.addEventListener('mousemove', (e) => {
  if (!mouseDown) return;
  yaw -= e.movementX * sensitivity;
  pitch -= e.movementY * sensitivity;
});

// ----------------------------------------------------
// PHYSICS
// ----------------------------------------------------
let speed = 0;
const maxSpeed = 0.25;
const accel = 0.006;
const friction = 0.003;
const turnSpeed = 0.04;

// ----------------------------------------------------
// CAMERA OFFSET
// ----------------------------------------------------
const baseOffset = new THREE.Vector3(0, 3, 8);
const lookOffset = new THREE.Vector3(0, 1, 0);

// ----------------------------------------------------
// LOOP
// ----------------------------------------------------
function animate() {

  requestAnimationFrame(animate);

  if (carModel) {

    // DRIVE
    if (keys['w']) speed += accel;
    else if (keys['s']) speed -= accel;
    else {
      if (speed > 0) speed -= friction;
      if (speed < 0) speed += friction;
    }

    speed = THREE.MathUtils.clamp(speed, -maxSpeed, maxSpeed);

    const speedFactor = Math.abs(speed) / maxSpeed;

    if (keys['a']) carModel.rotation.y += turnSpeed * speedFactor;
    if (keys['d']) carModel.rotation.y -= turnSpeed * speedFactor;

    carModel.translateZ(speed);

    // ------------------------------------------------
    // WHEEL STEERING
    // ------------------------------------------------
    if (frontWheelPivot) {
      let target = 0;
      if (keys['a']) target = maxSteer;
      if (keys['d']) target = -maxSteer;

      wheelSteer += (target - wheelSteer) * 0.2;
      frontWheelPivot.rotation.y = wheelSteer;
    }

    // ------------------------------------------------
    // WHEEL SPIN (FIXED DIRECTION + BOTH AXLES)
    // ------------------------------------------------
    wheelSpin += speed * 10;

    if (frontWheelPivot) frontWheelPivot.rotation.x = wheelSpin;
    if (rearWheelPivot) rearWheelPivot.rotation.x = wheelSpin;

    // ------------------------------------------------
    // CAMERA FOLLOW
    // ------------------------------------------------
    const rot = new THREE.Euler(pitch, yaw, 0, 'YXZ');

    const offset = baseOffset.clone();
    offset.applyEuler(rot);
    offset.applyQuaternion(carModel.quaternion);

    const desired = carModel.position.clone().add(offset);
    camera.position.lerp(desired, 0.1);

    const look = carModel.position.clone().add(lookOffset);
    camera.lookAt(look);
  }

  renderer.render(scene, camera);
}

animate();

// ----------------------------------------------------
// RESIZE
// ----------------------------------------------------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
